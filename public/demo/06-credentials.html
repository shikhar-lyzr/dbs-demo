<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set Credentials — DBS digibank</title>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body class="mode-phone" data-page="onboarding-credentials" data-step="6">

  <div class="page-wrapper">
    <div class="phone-frame">
      <div class="phone-screen">

        <!-- App Header -->
        <div class="app-header">
          <button class="back-btn" onclick="history.back()">&#8592;</button>
          <div class="header-title">Registration</div>
          <button class="chat-icon">💬</button>
        </div>

        <!-- Registration Band -->
        <div class="registration-band">
          <div class="band-text">Set username &amp; password</div>
          <div class="avatar-placeholder">👤</div>
        </div>

        <!-- Screen Content -->
        <div class="screen-content">

          <!-- Info Note -->
          <div class="info-note">
            <span class="info-icon">ℹ️</span>
            <span>Your application is automatically saved once you've set a username and password; simply log in to resume anytime.</span>
          </div>

          <!-- Username -->
          <div class="form-group">
            <input
              type="text"
              id="username"
              placeholder="Username"
              data-field="username"
              autocomplete="username"
            >
          </div>

          <!-- Password -->
          <div class="form-group">
            <input
              type="password"
              id="password"
              placeholder="Password"
              data-field="password"
              autocomplete="new-password"
            >
          </div>

          <!-- Re-enter Password -->
          <div class="form-group">
            <input
              type="password"
              id="password_confirm"
              placeholder="Re-enter password"
              data-field="password_confirm"
              autocomplete="new-password"
            >
          </div>

          <div class="spacer"></div>
        </div>

        <!-- Bottom Button -->
        <div class="bottom-btn-area">
          <button class="btn-primary" onclick="window.location.href='07-pan.html'">SUBMIT</button>
        </div>

      </div>
    </div>
  </div>

  <script src="http://localhost:3333/embed.js"
          data-origin="http://localhost:3333"
          data-page="onboarding-credentials"
          data-step="6"></script>
  <script src="shared/flow.js"></script>
</body>
</html>
