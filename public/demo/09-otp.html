<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Verification — DBS digibank</title>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body class="mode-phone" data-page="onboarding-otp" data-step="9">

  <div class="page-wrapper">
    <div class="phone-frame">
      <div class="phone-screen">

        <!-- App Header -->
        <div class="app-header">
          <button class="back-btn" onclick="history.back()">&#8592;</button>
          <div class="header-title">Registration</div>
          <button class="chat-icon">💬</button>
        </div>

        <!-- Screen Content -->
        <div class="screen-content">

          <!-- OTP Label -->
          <div style="text-align: center; padding: 12px 0 4px;">
            <div style="font-size: 14px; font-weight: 600; color: var(--text-secondary);">Enter the 6-digit OTP sent to your registered mobile number</div>
          </div>

          <!-- OTP Input: six boxes that mirror the hidden input -->
          <div class="otp-container" id="otp-boxes" onclick="document.getElementById('otp').focus()" style="cursor: text;">
            <div class="otp-box" id="otp-box-0"></div>
            <div class="otp-box" id="otp-box-1"></div>
            <div class="otp-box" id="otp-box-2"></div>
            <div class="otp-box" id="otp-box-3"></div>
            <div class="otp-box" id="otp-box-4"></div>
            <div class="otp-box" id="otp-box-5"></div>
          </div>

          <!-- Real input (visually hidden, captures keystrokes) -->
          <input
            type="text"
            id="otp"
            data-field="otp"
            autocomplete="one-time-code"
            maxlength="6"
            inputmode="numeric"
            aria-label="Enter 6-digit OTP"
            style="position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px;"
          >

          <!-- Timer Row -->
          <div class="otp-timer-row">
            <span style="font-size: 13px; color: var(--text-secondary);">Resend OTP in</span>
            <span class="timer-value" id="otp-timer">01:30</span>
            <span class="resend-btn-disabled" id="otp-resend">RESEND OTP</span>
          </div>

          <div class="spacer"></div>
        </div>

        <!-- Bottom Button -->
        <div class="bottom-btn-area">
          <button class="btn-primary" onclick="window.location.href='10-address.html'">NEXT</button>
        </div>

      </div>
    </div>
  </div>

  <script src="/embed.js"
          data-page="onboarding-otp"
          data-step="9"></script>
  <script src="shared/flow.js"></script>
  <script>
    (function () {
      var input = document.getElementById('otp');
      var boxes = [
        document.getElementById('otp-box-0'),
        document.getElementById('otp-box-1'),
        document.getElementById('otp-box-2'),
        document.getElementById('otp-box-3'),
        document.getElementById('otp-box-4'),
        document.getElementById('otp-box-5')
      ];
      var timerEl = document.getElementById('otp-timer');
      var resendBtn = document.getElementById('otp-resend');
      var ACTIVE_BORDER = '2px solid var(--dbs-red)';
      var FILLED_BG = 'var(--white)';
      var EMPTY_BG = 'var(--off-white)';

      function render() {
        var val = (input.value || '').replace(/\D/g, '').slice(0, 6);
        input.value = val;
        for (var i = 0; i < 6; i++) {
          boxes[i].textContent = val[i] || '';
          boxes[i].style.border = i === val.length ? ACTIVE_BORDER : '2px solid var(--border-grey)';
          boxes[i].style.background = val[i] ? FILLED_BG : EMPTY_BG;
        }
      }

      input.addEventListener('input', render);
      input.addEventListener('focus', render);
      // Focus input on any click of the boxes area
      document.getElementById('otp-boxes').addEventListener('click', function () {
        input.focus();
      });
      // Focus on load so user can type immediately
      setTimeout(function () { input.focus(); render(); }, 0);

      /* ── Countdown timer ── */
      var interval = null;
      function startTimer() {
        var seconds = 90;
        if (interval) clearInterval(interval);
        resendBtn.style.color = 'var(--text-muted)';
        resendBtn.style.cursor = 'not-allowed';
        resendBtn.style.fontWeight = '600';

        function tick() {
          if (seconds <= 0) {
            clearInterval(interval);
            timerEl.textContent = '00:00';
            resendBtn.style.color = 'var(--dbs-red)';
            resendBtn.style.cursor = 'pointer';
            resendBtn.style.fontWeight = '700';
            return;
          }
          var m = Math.floor(seconds / 60);
          var s = seconds % 60;
          timerEl.textContent = (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
          seconds--;
        }
        tick();
        interval = setInterval(tick, 1000);
      }

      resendBtn.addEventListener('click', function () {
        // Only respond when enabled (red).
        if (resendBtn.style.cursor !== 'pointer') return;
        startTimer();
        input.value = '';
        render();
        input.focus();
      });

      startTimer();
    })();
  </script>
</body>
</html>
