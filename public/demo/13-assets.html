<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financial Assets — DBS digibank</title>
  <link rel="stylesheet" href="shared/style.css">
</head>
<body class="mode-phone" data-page="onboarding-assets" data-step="13">

  <div class="page-wrapper">
    <div class="phone-frame">
      <div class="phone-screen">

        <!-- App Header -->
        <div class="app-header">
          <button class="back-btn" onclick="history.back()">&#8592;</button>
          <div class="header-title">Registration</div>
          <button class="chat-icon">💬</button>
        </div>

        <!-- Registration Band -->
        <div class="registration-band">
          <div class="band-text">Your estimated financial assets?</div>
          <div class="avatar-placeholder">👤</div>
        </div>

        <!-- Screen Content -->
        <div class="screen-content">

          <!-- Info Note -->
          <div class="info-note">
            <span class="info-icon">ℹ️</span>
            <span>
              This is a KYC requirement.&nbsp;
              <span class="in-app-link" onclick="window.demoStuck('financial_assets')">what are financial asset?</span>
            </span>
          </div>

          <!-- Assets Radio List -->
          <div class="radio-list">
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="upto_5l" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>Up to 5 lakhs</label>
            </label>
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="5l_10l" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>5 lakhs to 10 lakhs</label>
            </label>
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="10l_20l" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>10 lakhs to 20 lakhs</label>
            </label>
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="20l_50l" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>20 lakhs to 50 lakhs</label>
            </label>
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="50l_1cr" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>50 lakhs to 1 crore</label>
            </label>
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="1cr_5cr" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>1 crore to 5 crores</label>
            </label>
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="5cr_10cr" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>5 crores to 10 crores</label>
            </label>
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="10cr_15cr" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>10 crores to 15 crores</label>
            </label>
            <label class="radio-item">
              <input type="radio" name="financial_assets" value="above_15cr" data-field="financial_assets" onchange="window.demoStuck('financial_assets')">
              <label>15 crores or more</label>
            </label>
          </div>

          <div class="spacer"></div>
        </div>

        <!-- Bottom Button -->
        <div class="bottom-btn-area">
          <button class="btn-primary" onclick="window.location.href='14-family.html'">NEXT</button>
        </div>

      </div>
    </div>
  </div>

  <script src="http://localhost:3333/embed.js"
          data-origin="http://localhost:3333"
          data-page="onboarding-assets"
          data-step="13"></script>
  <script src="shared/flow.js"></script>
</body>
</html>
